name: Verify adapters

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-adapters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/sync-adapters.py
      - name: Fail on adapter drift
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all)" ]; then
            git status --short --untracked-files=all
            echo "Generated adapters are out of sync. Run python3 scripts/sync-adapters.py." >&2
            exit 1
          fi
